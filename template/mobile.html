<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title id="main-title">Loading...</title>
    <script src="my-data/config.js"></script>
    <script>
        document.write(`<meta name="description" content="${MY_CONFIG.name} - ${MY_CONFIG.title}">`);
        document.write(`<title>${MY_CONFIG.pageTitle}</title>`);
    </script>
    <meta name="color-scheme" content="light">
    <meta name="darkreader-lock" content="true">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            color-scheme: light !important;
            --bg: #ffffff;
            --fg: #000000;
            --accent: #000000;
            --muted: #888888;
            --border: #eeeeee;
            --card-bg: #fafafa;
            --radius: 12px;
            --font-body: 'Inter', sans-serif;
            --font-display: 'Playfair Display', serif;
        }

        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        .m-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .m-nav-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .m-nav-links {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .m-nav-links::-webkit-scrollbar { display: none; }

        .m-nav-links a {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--fg);
            text-decoration: none;
            white-space: nowrap;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .m-nav-links a:active { opacity: 1; }

        /* HERO */
        .m-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 24px 32px;
            gap: 28px;
        }

        .m-hero-img-wrap {
            position: relative;
            width: 100%;
            max-width: 340px;
            aspect-ratio: 3/4;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .m-hero-img-wrap img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .m-img-base { z-index: 1; }
        .m-img-hover {
            z-index: 2;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .m-img-hover.show { opacity: 1; }

        .m-hero-text { text-align: center; width: 100%; }

        .m-hero-name {
            font-family: var(--font-display);
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .m-hero-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .m-socials {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .m-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            color: var(--fg);
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .m-socials a:active { background: var(--fg); color: var(--bg); }
        .m-socials a svg { width: 20px; height: 20px; }

        /* DIVIDER */
        .m-divider {
            height: 1px;
            background: var(--border);
            margin: 0 24px;
        }

        /* SECTION */
        .m-section {
            padding: 40px 24px;
        }

        .m-section-label {
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 24px;
        }

        /* ABOUT SECTION */
        .m-about-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .m-about-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .m-about-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        .m-about-name {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .m-about-subtitle {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .m-about-desc {
            font-size: 0.92rem;
            line-height: 1.75;
            color: #333;
            white-space: pre-line;
        }

        .m-about-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 4px;
        }

        .m-meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 100px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--fg);
        }

        /* CARDS */
        .m-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .m-card:last-child { margin-bottom: 0; }

        .m-card-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background: #f0f0f0;
        }

        .m-card-body {
            padding: 18px 16px;
        }

        .m-card-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .m-card-desc {
            font-size: 0.82rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 12px;
        }

        .m-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .m-skill-tag {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 100px;
            background: var(--card-bg);
            color: var(--fg);
            border: 1px solid var(--border);
        }

        .m-card-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1.5px solid var(--fg);
            color: var(--fg);
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .m-card-btn:active { background: var(--fg); color: var(--bg); }
        .m-card-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        .m-card-btn--primary {
            background: var(--fg);
            color: var(--bg);
        }
        .m-card-btn--primary:active { opacity: 0.7; }

        /* CERT CARD */
        .m-cert-thumb {
            width: 100%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 160px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .m-cert-thumb canvas,
        .m-cert-thumb img {
            width: 100%;
            height: auto;
            display: block;
        }

        .m-cert-thumb-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.04);
            transition: background 0.2s;
        }
        .m-cert-thumb-overlay svg {
            width: 32px; height: 32px;
            color: rgba(0,0,0,0.3);
        }

        /* LIGHTBOX */
        #m-lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0,0,0,0.92);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #m-lightbox.active { display: flex; }

        #m-lightbox img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }

        #m-lightbox-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            line-height: 1;
            padding: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        /* FOOTER */
        .m-footer {
            padding: 32px 24px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .m-footer-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .m-footer-copy {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        /* DESKTOP WARNING */
        .m-desktop-link {
            text-align: center;
            padding: 10px 24px;
            font-size: 0.72rem;
            color: var(--muted);
        }

        .m-desktop-link a {
            color: var(--fg);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="m-nav">
        <span class="m-nav-name" id="m-nav-name">Loading…</span>
        <div class="m-nav-links">
            <a href="#m-about">About</a>
            <a href="#m-projects">Projects</a>
            <a href="#m-certs">Certs</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="m-hero">
        <div class="m-hero-img-wrap" id="m-hero-wrap">
            <img class="m-img-base" id="m-img-base" src="" alt="Hero photo">
            <img class="m-img-hover" id="m-img-hover" src="" alt="Hero hover photo">
        </div>
        <div class="m-hero-text">
            <h1 class="m-hero-name" id="m-hero-name">—</h1>
            <p class="m-hero-title" id="m-hero-title">—</p>
            <div class="m-socials" id="m-socials"></div>
        </div>
    </section>

    <div class="m-divider"></div>

    <!-- ABOUT -->
    <section class="m-section" id="m-about">
        <p class="m-section-label">About</p>
        <div class="m-about-content" id="m-about-content">
            <div class="m-about-header">
                <img class="m-about-img" id="m-about-img" src="" alt="About photo" onerror="this.style.display='none'">
                <div>
                    <div class="m-about-name" id="m-about-name">—</div>
                    <div class="m-about-subtitle" id="m-about-subtitle">—</div>
                </div>
            </div>
            <div class="m-about-meta" id="m-about-meta"></div>
            <p class="m-about-desc" id="m-about-desc">—</p>
        </div>
    </section>

    <div class="m-divider"></div>

    <!-- PROJECTS -->
    <section class="m-section" id="m-projects">
        <p class="m-section-label">Projects</p>
        <div id="m-projects-list"></div>
    </section>

    <div class="m-divider"></div>

    <!-- CERTIFICATIONS -->
    <section class="m-section" id="m-certs">
        <p class="m-section-label">Certifications</p>
        <div id="m-certs-list"></div>
    </section>

    <div class="m-divider"></div>

    <!-- FOOTER -->
    <footer class="m-footer">
        <div class="m-footer-name" id="m-footer-name">—</div>
        <div class="m-footer-copy" id="m-footer-copy"></div>
    </footer>

    <!-- LIGHTBOX -->
    <div id="m-lightbox">
        <span id="m-lightbox-close">&times;</span>
        <img src="" alt="Certificate preview" id="m-lightbox-img">
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function renderPdfToCanvas(dataUri, canvas) {
            try {
                const base64 = dataUri.replace(/^data:application\/pdf;base64,/, '');
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                const page = await pdf.getPage(1);
                const unscaled = page.getViewport({ scale: 1 });
                const scale = 1200 / unscaled.width;
                const vp = page.getViewport({ scale });
                canvas.width = vp.width;
                canvas.height = vp.height;
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                return canvas;
            } catch (e) {
                console.warn('PDF render failed', e);
                return null;
            }
        }

        const EMPTY_DB = { bio: {}, projects: [], certs: [] };

        const mergeItemsByKey = (existing = [], defaults = [], key = 'title') => {
            const merged = Array.isArray(existing) ? [...existing] : [];
            const seen = new Set(merged.map(x => (x?.[key] || '').toString().trim().toLowerCase()).filter(Boolean));
            (Array.isArray(defaults) ? defaults : []).forEach(item => {
                const k = (item?.[key] || '').toString().trim().toLowerCase();
                if (k && !seen.has(k)) { merged.push(item); seen.add(k); }
            });
            return merged;
        };

        const mergeWithDefaults = (data = {}, defaults = EMPTY_DB) => ({
            bio: data.bio && Object.keys(data.bio).length ? data.bio : (defaults.bio || {}),
            projects: mergeItemsByKey(data.projects, defaults.projects, 'title'),
            certs: mergeItemsByKey(data.certs, defaults.certs, 'title')
        });

        const toCertSlug = (title = '') => title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

        const resolveCertImage = (item = {}) => {
            const slug = toCertSlug(item.title || 'certificate');
            let primary = '';
            if (item.img) {
                if (item.img.startsWith('data:') || item.img.startsWith('http')) primary = item.img;
                else primary = `my-data/images/certs/${item.img}`;
            } else {
                primary = `${MY_CONFIG.certImageBaseUrl}/${slug}.png`;
            }
            return {
                primary: primary.replace(/\s+/g, ''),
                fallback: 'https://via.placeholder.com/800x450?text=Certificate'
            };
        };

        const ghIconSvg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>`;
        const liveIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
        const expandIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`;
        const checkIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

        function renderProjects(items) {
            const el = document.getElementById('m-projects-list');
            if (!items || !items.length) { el.innerHTML = '<p style="color:#888;font-size:0.85rem">No projects yet.</p>'; return; }
            el.innerHTML = items.map(item => {
                const hasGh = item.link && item.link.includes('github.com');
                const hasLink = item.link && item.link.trim() !== '' && item.link !== '#';
                const skills = (item.skills || '').split(',').map(s => s.trim()).filter(Boolean);
                const btnHtml = hasGh
                    ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="m-card-btn">${ghIconSvg} View on GitHub</a>`
                    : hasLink
                    ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="m-card-btn">${liveIconSvg} View Live Project</a>`
                    : '';
                const imgHtml = item.img ? `<img class="m-card-img" src="${item.img}" alt="${item.title}" loading="lazy">` : '';
                return `
                    <div class="m-card">
                        ${imgHtml}
                        <div class="m-card-body">
                            <div class="m-card-title">${item.title}</div>
                            <div class="m-card-desc">${item.learned || ''}</div>
                            ${skills.length ? `<div class="m-skills">${skills.map(s => `<span class="m-skill-tag">${s}</span>`).join('')}</div>` : ''}
                            ${btnHtml}
                        </div>
                    </div>`;
            }).join('');
        }

        function renderCerts(items) {
            const el = document.getElementById('m-certs-list');
            if (!items || !items.length) { el.innerHTML = '<p style="color:#888;font-size:0.85rem">No certifications yet.</p>'; return; }
            el.innerHTML = items.map((item, idx) => {
                const isPdf = item.img && item.img.startsWith('data:application/pdf');
                const certImg = resolveCertImage(item);
                const skills = (item.skills || '').split(',').map(s => s.trim()).filter(Boolean);
                const hasLink = item.link && item.link.trim() !== '' && item.link !== '#';
                const verifyBtn = hasLink
                    ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="m-card-btn m-card-btn--primary">${checkIconSvg} Verify Certificate</a>`
                    : '';
                const thumbContent = isPdf
                    ? `<canvas id="m-pdf-${idx}" data-pdf="${item.img}"></canvas>`
                    : `<img src="${certImg.primary}" alt="${item.title}" onerror="this.src='${certImg.fallback}'" loading="lazy">`;

                return `
                    <div class="m-card">
                        <div class="m-cert-thumb" id="m-cert-thumb-${idx}" data-cert-src="" data-cert-fallback="${certImg.fallback}" data-is-pdf="${isPdf}">
                            ${thumbContent}
                            <div class="m-cert-thumb-overlay">${expandIconSvg}</div>
                        </div>
                        <div class="m-card-body">
                            <div class="m-card-title">${item.title}</div>
                            <div class="m-card-desc">${item.learned || ''}</div>
                            ${skills.length ? `<div class="m-skills">${skills.map(s => `<span class="m-skill-tag">${s}</span>`).join('')}</div>` : ''}
                            ${verifyBtn}
                        </div>
                    </div>`;
            }).join('');
        }

        async function renderPdfs() {
            const canvases = document.querySelectorAll('[id^="m-pdf-"]');
            for (const canvas of canvases) {
                if (canvas.dataset.pdf) {
                    await renderPdfToCanvas(canvas.dataset.pdf, canvas);
                    const idx = canvas.id.replace('m-pdf-', '');
                    const thumb = document.getElementById(`m-cert-thumb-${idx}`);
                    if (thumb) thumb.dataset.certSrc = '';
                }
            }
        }

        function setupCertLightbox() {
            const lightbox = document.getElementById('m-lightbox');
            const lightboxImg = document.getElementById('m-lightbox-img');
            const closeBtn = document.getElementById('m-lightbox-close');

            document.querySelectorAll('[id^="m-cert-thumb-"]').forEach(thumb => {
                thumb.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    openLightboxFromThumb(thumb);
                }, { passive: false });
                thumb.addEventListener('click', () => openLightboxFromThumb(thumb));
            });

            function openLightboxFromThumb(thumb) {
                let src = thumb.dataset.certSrc;
                if (!src) {
                    const canvas = thumb.querySelector('canvas');
                    if (canvas) {
                        try { src = canvas.toDataURL('image/png', 1.0); } catch (e) {}
                    }
                }
                if (!src) {
                    const img = thumb.querySelector('img');
                    if (img) src = img.src;
                }
                if (!src) {
                    src = thumb.dataset.certFallback;
                }
                if (!src) return;
                lightboxImg.src = src;
                lightbox.classList.add('active');
            }

            closeBtn.addEventListener('click', () => lightbox.classList.remove('active'));
            lightbox.addEventListener('touchstart', (e) => {
                if (e.target === lightbox) lightbox.classList.remove('active');
            }, { passive: true });
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) lightbox.classList.remove('active');
            });
        }

        function setupHeroToggle() {
            const wrap = document.getElementById('m-hero-wrap');
            const hoverImg = document.getElementById('m-img-hover');
            if (!wrap || !hoverImg) return;

            wrap.addEventListener('touchstart', (e) => {
                e.preventDefault();
                hoverImg.classList.toggle('show');
            }, { passive: false });

            wrap.addEventListener('click', () => {
                hoverImg.classList.toggle('show');
            });
        }

        function renderSocials() {
            const el = document.getElementById('m-socials');
            const parts = [];
            const gh = MY_CONFIG.socials?.github;
            const li = MY_CONFIG.socials?.linkedin;
            const em = MY_CONFIG.socials?.email;

            if (gh) parts.push(`<a href="${gh}" target="_blank" rel="noopener noreferrer" aria-label="GitHub">${ghIconSvg}</a>`);
            if (li) parts.push(`<a href="${li}" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>`);
            if (em) parts.push(`<a href="mailto:${em}" aria-label="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a>`);
            el.innerHTML = parts.join('');
        }

        async function init() {
            document.getElementById('m-nav-name').textContent = MY_CONFIG.name || '';
            document.getElementById('m-hero-name').textContent = MY_CONFIG.name || '';
            document.getElementById('m-hero-title').textContent = MY_CONFIG.title || '';
            document.getElementById('main-title').textContent = MY_CONFIG.pageTitle || MY_CONFIG.name || '';

            document.getElementById('m-img-base').src = MY_CONFIG.heroBaseImage || '';
            document.getElementById('m-img-hover').src = MY_CONFIG.heroHoverImage || '';

            renderSocials();
            setupHeroToggle();

            let defaults = { ...EMPTY_DB };
            try {
                const res = await fetch(MY_CONFIG.dataFile);
                if (res.ok) defaults = await res.json();
            } catch (e) {
                console.warn('Failed to load portfolio_data.json', e);
            }

            const localRaw = localStorage.getItem(MY_CONFIG.storageKey);
            const local = localRaw ? JSON.parse(localRaw) : EMPTY_DB;
            const db = mergeWithDefaults(local, defaults);

            const bio = db.bio || {};
            const name = bio.name || MY_CONFIG.name || '';

            document.getElementById('m-about-name').textContent = name;
            document.getElementById('m-about-subtitle').textContent = bio.title || MY_CONFIG.title || '';
            document.getElementById('m-about-desc').textContent = bio.desc || '';

            const aboutImg = document.getElementById('m-about-img');
            if (bio.img) { aboutImg.src = bio.img; } else { aboutImg.style.display = 'none'; }

            const metaEl = document.getElementById('m-about-meta');
            const chips = [];
            if (bio.loc) chips.push(`<span class="m-meta-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>${bio.loc}</span>`);
            if (bio.exp) chips.push(`<span class="m-meta-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>${bio.exp}</span>`);
            metaEl.innerHTML = chips.join('');

            document.getElementById('m-footer-name').textContent = name;
            document.getElementById('m-footer-copy').textContent = `All rights reserved to ${name}. © ${new Date().getFullYear()}`;

            renderProjects(db.projects);
            renderCerts(db.certs);

            await renderPdfs();
            setupCertLightbox();
        }

        init();
    </script>
</body>
</html>
